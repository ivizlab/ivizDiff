# iVizDiff — Default Configuration
# ─────────────────────────────────────────────────────────────────────────────
# All paths are relative to the iVizDiff repo root.
# See docs/INSTALL.md for model download instructions.
# ─────────────────────────────────────────────────────────────────────────────

# Base diffusion model — must be SD1.5, diffusers format.
# NOT compatible with SDXL or SD3.
#
# Option A — Free, downloads automatically from HuggingFace:
#   model_id: "runwayml/stable-diffusion-v1-5"
#
# Option B — Local model (faster startup, no internet needed):
#   Download a SD1.5 diffusers-format model, place in models/sd/
#   e.g. PerfectPhotonV2 from CivitAI (convert to diffusers format first)
#   model_id: "models/sd/PerfectPhotonV2.1"
#
model_id: "models/sd/PerfectPhotonV2.1"

t_index_list: [32, 45]
output_type: "pt"

width: 512
height: 512
device: "cuda"
dtype: "float16"
delta: 0.7
frame_buffer_size: 1
use_lcm_lora: true
use_tiny_vae: true

# Acceleration — choose based on your setup:
#   tensorrt  — fastest, requires building engines first (see docs/INSTALL.md)
#   none      — safe fallback, works on all GPUs, slower
#
# RTX 5090 / Blackwell: do NOT use xformers — it will crash.
# RTX 3090 / 4090: xformers is optional, tensorrt is faster.
#
acceleration: "tensorrt"
#acceleration: "none"

engine_dir: "engines"

# Directory scanned for input video files (shown in the video input picker).
# Relative paths are resolved from wherever you launch iVizDiff.
# Override here if your videos live elsewhere, e.g. "C:/videos/input"
video_input_dir: "videos/input"

seed: 789

mode: "img2img"
use_denoising_batch: true
cfg_type: "self"

negative_prompt: "blurry, low quality, nudity, nsfw"
guidance_scale: 1.1
num_inference_steps: 50

prompt_blending:
  prompt_list:
    - ["abstract sculpture, masterpiece, highest detail, 4k", 1.0]
    - ["fire, sun rays, sparks, masterpiece, highest detail, 4k", 0.0]

seed_blending:
  seed_list:
    - [789, 1.0]
    - [1234, 0.0]

use_controlnet: true
use_ipadapter: true
use_streamv2v: false

# IPAdapter — requires ip-adapter_sd15.bin and image_encoder in models/ipadapter/
# Download from: https://huggingface.co/h94/IP-Adapter
# Place files at:
#   models/ipadapter/models/ip-adapter_sd15.bin
#   models/ipadapter/models/image_encoder/   (the full folder)
#
ipadapters:
  - ipadapter_model_path: "models/ipadapter/models/ip-adapter_sd15.bin"
    image_encoder_path: "models/ipadapter/models/image_encoder"
    scale: 0.70
    enabled: true

# ControlNet — sd15_tile runs locally from models/controlnet/sd15_tile/
# Download from: https://huggingface.co/lllyasviel/control_v11f1e_sd15_tile
# Place the full diffusers-format folder at: models/controlnet/sd15_tile/
#
# Alternative: use the HuggingFace ID directly (downloads automatically):
#   model_id: "lllyasviel/control_v11f1e_sd15_tile"
#
controlnets:
  - model_id: "models/controlnet/sd15_tile"
    conditioning_scale: 0.2
    preprocessor: "feedback"
    preprocessor_params:
      feedback_strength: 0.20
      image_resolution: 512
    enabled: true
